name: Build macOS (arm64 + x86_64)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12.13"
  PYTHON_TAG: "20260414"
  PYTHON_MACOS_BASE: "https://github.com/astral-sh/python-build-standalone/releases/download"
  VERSION: ${{ github.ref_name || 'latest' }}

jobs:
  build-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        run: rustup default stable

      - name: Download Python ${{ env.PYTHON_VERSION }} (aarch64)
        run: |
          curl -L "${{ env.PYTHON_MACOS_BASE }}/${{ env.PYTHON_TAG }}/cpython-${{ env.PYTHON_VERSION }}+${{ env.PYTHON_TAG }}-aarch64-apple-darwin-install_only.tar.gz" \
            -o /tmp/python_aarch64.tar.gz
          mkdir -p python_macos/aarch64
          tar -xzf /tmp/python_aarch64.tar.gz -C python_macos/aarch64 --strip-components=1

      - name: Install pip packages
        run: |
          python_macos/aarch64/bin/python3 -m ensurepip --upgrade
          python_macos/aarch64/bin/pip install --upgrade pip
          python_macos/aarch64/bin/pip install -r requirements.txt

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Inject Python runtime
        run: cp -R python_macos frontend/src-tauri/

      - name: Build Tauri
        run: cd frontend && npm run tauri:build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUSTFLAGS: "-C link-arg=-mmacosx-version-min=10.15"

      - name: Package artifacts
        run: |
          # ZIP
          ditto -c -k --keepParent frontend/src-tauri/target/release/bundle/macos/PlotPilot.app \
            PlotPilot-${{ env.VERSION }}-macos-aarch64.zip
          sha256sum PlotPilot-${{ env.VERSION }}-macos-aarch64.zip \
            | awk '{print $1}' > PlotPilot-${{ env.VERSION }}-macos-aarch64.zip.sha256

          # DMG (already built by Tauri)
          DMG_PATH=$(find frontend/src-tauri/target/release/bundle/dmg -name "PlotPilot_*.dmg" | head -1)
          if [ -z "$DMG_PATH" ]; then
            echo "ERROR: DMG file not found in bundle/dmg directory"
            exit 1
          fi
          cp "$DMG_PATH" "PlotPilot-${{ env.VERSION }}-macos-aarch64.dmg"
          sha256sum "PlotPilot-${{ env.VERSION }}-macos-aarch64.dmg" \
            | awk '{print $1}' > "PlotPilot-${{ env.VERSION }}-macos-aarch64.dmg.sha256"

          echo "=== aarch64 artifacts ==="
          ls -lh PlotPilot-${{ env.VERSION }}-macos-aarch64.*
          echo ""
          echo "=== sha256 ==="
          cat PlotPilot-${{ env.VERSION }}-macos-aarch64.zip.sha256
          cat PlotPilot-${{ env.VERSION }}-macos-aarch64.dmg.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plotpilot-aarch64
          path: |
            PlotPilot-${{ env.VERSION }}-macos-aarch64.zip
            PlotPilot-${{ env.VERSION }}-macos-aarch64.zip.sha256
            PlotPilot-${{ env.VERSION }}-macos-aarch64.dmg
            PlotPilot-${{ env.VERSION }}-macos-aarch64.dmg.sha256
          retention-days: 5

  build-intel:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        run: rustup default stable

      - name: Download Python ${{ env.PYTHON_VERSION }} (x86_64)
        run: |
          curl -L "${{ env.PYTHON_MACOS_BASE }}/${{ env.PYTHON_TAG }}/cpython-${{ env.PYTHON_VERSION }}+${{ env.PYTHON_TAG }}-x86_64-apple-darwin-install_only.tar.gz" \
            -o /tmp/python_x86_64.tar.gz
          mkdir -p python_macos/x86_64
          tar -xzf /tmp/python_x86_64.tar.gz -C python_macos/x86_64 --strip-components=1

      - name: Install pip packages
        run: |
          python_macos/x86_64/bin/python3 -m ensurepip --upgrade
          python_macos/x86_64/bin/pip install --upgrade pip
          python_macos/x86_64/bin/pip install -r requirements.txt

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Inject Python runtime
        run: cp -R python_macos frontend/src-tauri/

      - name: Build Tauri
        run: cd frontend && npm run tauri:build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUSTFLAGS: "-C link-arg=-mmacosx-version-min=10.15"

      - name: Package artifacts
        run: |
          # ZIP
          ditto -c -k --keepParent frontend/src-tauri/target/release/bundle/macos/PlotPilot.app \
            PlotPilot-${{ env.VERSION }}-macos-x86_64.zip
          sha256sum PlotPilot-${{ env.VERSION }}-macos-x86_64.zip \
            | awk '{print $1}' > PlotPilot-${{ env.VERSION }}-macos-x86_64.zip.sha256

          # DMG (already built by Tauri)
          DMG_PATH=$(find frontend/src-tauri/target/release/bundle/dmg -name "PlotPilot_*.dmg" | head -1)
          if [ -z "$DMG_PATH" ]; then
            echo "ERROR: DMG file not found in bundle/dmg directory"
            exit 1
          fi
          cp "$DMG_PATH" "PlotPilot-${{ env.VERSION }}-macos-x86_64.dmg"
          sha256sum "PlotPilot-${{ env.VERSION }}-macos-x86_64.dmg" \
            | awk '{print $1}' > "PlotPilot-${{ env.VERSION }}-macos-x86_64.dmg.sha256"

          echo "=== x86_64 artifacts ==="
          ls -lh PlotPilot-${{ env.VERSION }}-macos-x86_64.*
          echo ""
          echo "=== sha256 ==="
          cat PlotPilot-${{ env.VERSION }}-macos-x86_64.zip.sha256
          cat PlotPilot-${{ env.VERSION }}-macos-x86_64.dmg.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plotpilot-x86_64
          path: |
            PlotPilot-${{ env.VERSION }}-macos-x86_64.zip
            PlotPilot-${{ env.VERSION }}-macos-x86_64.zip.sha256
            PlotPilot-${{ env.VERSION }}-macos-x86_64.dmg
            PlotPilot-${{ env.VERSION }}-macos-x86_64.dmg.sha256
          retention-days: 5
