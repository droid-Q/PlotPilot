name: Build macOS (arm64 + x86_64)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12.13"
  PYTHON_TAG: "20260414"
  PYTHON_MACOS_BASE: "https://github.com/astral-sh/python-build-standalone/releases/download"
  VERSION: ${{ github.ref_name || 'latest' }}

jobs:
  build-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        run: rustup default stable

      - name: Download Python ${{ env.PYTHON_VERSION }} (aarch64)
        run: |
          curl -L "${{ env.PYTHON_MACOS_BASE }}/${{ env.PYTHON_TAG }}/cpython-${{ env.PYTHON_VERSION }}+${{ env.PYTHON_TAG }}-aarch64-apple-darwin-install_only.tar.gz" \
            -o /tmp/python_aarch64.tar.gz
          mkdir -p python_macos/aarch64
          tar -xzf /tmp/python_aarch64.tar.gz -C python_macos/aarch64 --strip-components=1

      - name: Install pip packages (aarch64)
        run: |
          python_macos/aarch64/bin/python3 -m ensurepip --upgrade
          python_macos/aarch64/bin/pip install --upgrade pip
          python_macos/aarch64/bin/pip install -r requirements.txt

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Inject Python runtime into frontend for bundling
        run: cp -R python_macos frontend/src-tauri/

      - name: Build Tauri (aarch64)
        run: cd frontend && npm run tauri:build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUSTFLAGS: "-C link-arg=-mmacosx-version-min=10.15"

      - name: Package .app
        run: |
          ditto -c -k --keepParent frontend/src-tauri/target/release/bundle/macos/PlotPilot.app \
            PlotPilot-${{ env.VERSION }}-macos-aarch64.zip
          sha256sum PlotPilot-${{ env.VERSION }}-macos-aarch64.zip \
            | awk '{print $1}' > PlotPilot-${{ env.VERSION }}-macos-aarch64.zip.sha256

      - name: Upload arm64 zip + sha256
        uses: actions/upload-artifact@v4
        with:
          name: plotpilot-arm64-zip
          path: |
            PlotPilot-${{ env.VERSION }}-macos-aarch64.zip
            PlotPilot-${{ env.VERSION }}-macos-aarch64.zip.sha256
          retention-days: 5

  build-intel:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        run: rustup default stable

      - name: Download Python ${{ env.PYTHON_VERSION }} (x86_64)
        run: |
          curl -L "${{ env.PYTHON_MACOS_BASE }}/${{ env.PYTHON_TAG }}/cpython-${{ env.PYTHON_VERSION }}+${{ env.PYTHON_TAG }}-x86_64-apple-darwin-install_only.tar.gz" \
            -o /tmp/python_x86_64.tar.gz
          mkdir -p python_macos/x86_64
          tar -xzf /tmp/python_x86_64.tar.gz -C python_macos/x86_64 --strip-components=1

      - name: Install pip packages (x86_64)
        run: |
          python_macos/x86_64/bin/python3 -m ensurepip --upgrade
          python_macos/x86_64/bin/pip install --upgrade pip
          python_macos/x86_64/bin/pip install -r requirements.txt

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Inject Python runtime into frontend for bundling
        run: cp -R python_macos frontend/src-tauri/

      - name: Build Tauri (x86_64)
        run: cd frontend && npm run tauri:build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUSTFLAGS: "-C link-arg=-mmacosx-version-min=10.15"

      - name: Package .app
        run: |
          ditto -c -k --keepParent frontend/src-tauri/target/release/bundle/macos/PlotPilot.app \
            PlotPilot-${{ env.VERSION }}-macos-x86_64.zip
          sha256sum PlotPilot-${{ env.VERSION }}-macos-x86_64.zip \
            | awk '{print $1}' > PlotPilot-${{ env.VERSION }}-macos-x86_64.zip.sha256

      - name: Upload x86_64 zip + sha256
        uses: actions/upload-artifact@v4
        with:
          name: plotpilot-x86_64-zip
          path: |
            PlotPilot-${{ env.VERSION }}-macos-x86_64.zip
            PlotPilot-${{ env.VERSION }}-macos-x86_64.zip.sha256
          retention-days: 5

  combine:
    needs: [build-arm64, build-intel]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download arm64 .app
        uses: actions/download-artifact@v4
        with:
          name: plotpilot-arm64-zip
          path: arm64

      - name: Download x86_64 .app
        uses: actions/download-artifact@v4
        with:
          name: plotpilot-x86_64-zip
          path: intel

      - name: Unzip both for lipo
        run: |
          unzip -q arm64/PlotPilot-*.zip -d arm64_app
          unzip -q intel/PlotPilot-*.zip -d intel_app
          ls arm64_app/ intel_app/

      - name: Combine Rust binaries with lipo
        run: |
          cp arm64_app/PlotPilot.app/Contents/MacOS/PlotPilot arm64_binary
          cp intel_app/PlotPilot.app/Contents/MacOS/PlotPilot intel_binary
          lipo -create -output universal_binary arm64_binary intel_binary
          cp universal_binary arm64_app/PlotPilot.app/Contents/MacOS/PlotPilot
          ls -lh universal_binary

      - name: Bundle both Python runtimes into universal app
        run: |
          cp -R intel_app/PlotPilot.app/Contents/Resources/python_macos \
             arm64_app/PlotPilot.app/Contents/Resources/python_macos_x86_64
          ls arm64_app/PlotPilot.app/Contents/Resources/

      - name: Re-sign for universal
        run: |
          if [ -n "$CODESIGN_IDENTITY" ]; then
            codesign -f -s "$CODESIGN_IDENTITY" arm64_app/PlotPilot.app || true
          fi

      - name: Create DMG (universal)
        run: |
          DMG_OUT="PlotPilot-${{ env.VERSION }}-macos-universal.dmg"
          TEMP_DIR=$(mktemp -d)
          cp -R arm64_app/PlotPilot.app "$TEMP_DIR/"
          hdiutil create -volname "PlotPilot" -fs HFS+ -srcfolder "$TEMP_DIR" -ov -format UDZO "$DMG_OUT"
          ls -lh "$DMG_OUT"

      - name: Create ZIP (universal) + sha256 for both
        run: |
          ZIP_OUT="PlotPilot-${{ env.VERSION }}-macos-universal.zip"
          ditto -c -k --keepParent arm64_app/PlotPilot.app "$ZIP_OUT"

          # sha256 for DMG
          sha256sum PlotPilot-${{ env.VERSION }}-macos-universal.dmg \
            | awk '{print $1}' > PlotPilot-${{ env.VERSION }}-macos-universal.dmg.sha256

          # sha256 for ZIP
          sha256sum "$ZIP_OUT" \
            | awk '{print $1}' > "$ZIP_OUT.sha256"

          # Verify
          echo "=== DMG sha256 ==="
          cat PlotPilot-${{ env.VERSION }}-macos-universal.dmg.sha256
          echo "=== ZIP sha256 ==="
          cat "$ZIP_OUT.sha256"
          ls -lh PlotPilot-${{ env.VERSION }}-macos-universal.dmg "$ZIP_OUT"

      - name: Upload final artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plotpilot-macos-universal
          path: |
            PlotPilot-${{ env.VERSION }}-macos-universal.dmg
            PlotPilot-${{ env.VERSION }}-macos-universal.dmg.sha256
            PlotPilot-${{ env.VERSION }}-macos-universal.zip
            PlotPilot-${{ env.VERSION }}-macos-universal.zip.sha256
          retention-days: 5
